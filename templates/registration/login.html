{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block body %}

<h1>Iniciar sesion</h1>


<form method="POST">

    {% csrf_token %}
    {{ form.as_p }}

    <br>

    <button type="submit">
        Login
    </button>

    <br>


    <a href="{% url 'register' %}">¿No tienes una cuenta? Registrarse</a>

</form>

{% endblock %}
