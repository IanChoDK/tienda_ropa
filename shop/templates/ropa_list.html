{% extends 'base.html' %}

{% block title %}Ropa{% endblock %}

{% block body %}
    <h1 class="text-2xl font-bold">Ropa disponible</h1>
    <ul>
        {% for item in ropa %}
            <li>{{ item.nombre }}</li>
            <li>{{ item.descripcion }}</li>
            <li>${{ item.precio }}</li>
            {% if item.imagen %}
                <img src="{{ item.imagen.url }}" alt="{{ item.nombre }}" width="200">
            {% else %}
                <p>No hay imagen</p>
            {% endif %}
        {% endfor %}
    </ul>
{% endblock %}
