{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
    {% tailwind_css %}
</head>




<body class="flex flex-col min-h-screen pt-16 items-center text-center justify-center bg-neutral-900 text-white">
    
    <navbar class="w-full bg-neutral-300 fixed top-0">
        <div class="flex items-center justify-between p-4 w-full">
            <a href="{% url 'ropa_list' %}" class="text-black hover:text-red-600 text-lg font-bold">Tienda de Ropa</a>
            <div class="text-black">
                <a href="{% url 'crear_ropa' %}" class=" hover:text-red-600 px-3 py-2 rounded-md text-sm font-medium">Subir ropa</a>
            </div>
            
        </div>
    </navbar>

    {% block body %}

    {% endblock %}

    <footer class="w-full bg-neutral-800 text-white mt-auto">
        <div class="flex items-center justify-between">
            <div class="flex flex-row items-center">
                <h3 class="text-xl px-3">Contactanos</h3>
                <ul class="text-xs items-center text-left">
                    <li>Nuestro whatsapp: {{ telefono }}</li>
                    <li>Nuestro E-mail: {{ email }}</li>
                    <li>Nuestra Tienda fisica: {{ direccion }}</li>
                </ul>
            </div>
            <a>{{fecha}}</a>
        </div>
    </footer>

</body>

</html>
