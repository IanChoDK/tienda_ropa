<h1>Iniciar sesion</h1>

{% if error %}
<p>
    {{ error }}
</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <label>
        Usuario:
    </label>

    <input 
        type="text"
        name="username"
    >

    <br>

    <label>
        Contrasenia:
    </label>

    <input 
        type="password"
        name="password"
    >

    <br>

    <button type="submit">
        Entrar
    </button>
</form>
