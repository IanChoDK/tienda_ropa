{% extends 'base.html' %}

{% block title %}Editando Producto{% endblock %}

{% block body %}

<h1 class="text-2xl font-bold mb-4 ">Editando producto</h1>
<form class="flex flex-col items-center bg-neutral-700 rounded-2xl p-2 " method="post" enctype="multipart/form-data">

    {% csrf_token %}
    {{ form.as_p }}

    <button class="bg-red-800 hover:bg-red-500 text-white max-w-xs cursor-pointer font-bold py-2 px-4 rounded" type="submit">Guardar cambios</button>
</form>

{% endblock %}
